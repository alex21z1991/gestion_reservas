<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inicio de sesión</title>

<link rel="icon" type="image/png" href="imagenes/reserva.png">

<link rel="stylesheet" href="cssgeneral.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous">

</head>

<body class="bg-light">

<!-- Barra superior -->

<nav class="navbar bg-dark navbar-dark">

<div class="container-fluid">

<a href="index.html" class="navbar-brand">

<img src="imagenes/image__1_-removebg-preview.png"
     alt="Logo"
     width="90"
     height="90"
     class="d-inline-block align-text-top">

</a>

</div>

</nav>


<div class="container vh-100 d-flex justify-content-center align-items-center">

<!-- FORMULARIO -->

<div class="card shadow"
     id="contenedorSesion"
     style="width:400px;">

<div class="card-body">

<ul class="nav nav-tabs mb-4" id="tabs">

<li class="nav-item">

<button class="nav-link active"
        data-bs-toggle="tab"
        data-bs-target="#login">

Iniciar Sesión

</button>

</li>

<li class="nav-item">

<button class="nav-link"
        data-bs-toggle="tab"
        data-bs-target="#registro">

Registrarse

</button>

</li>

</ul>


<div class="tab-content">

<!-- LOGIN -->

<div class="tab-pane fade show active"
     id="login">

<h4 class="text-center mb-3">

Iniciar Sesión

</h4>

<form id="formLogin">

<div class="mb-3">

<label class="form-label">

Correo

</label>

<input type="email"
       id="loginCorreo"
       class="form-control"
       placeholder="correo@ejemplo.com"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Contraseña

</label>

<input type="password"
       id="loginPassword"
       class="form-control"
       placeholder="********"
       required>

</div>

<button type="submit"
        class="btn btn-primary w-100">

Ingresar

</button>

</form>

</div>


<!-- REGISTRO -->

<div class="tab-pane fade"
     id="registro">

<h4 class="text-center mb-3">

Registrarse

</h4>

<form id="formRegistro">

<div class="mb-3">

<label class="form-label">

Nombre

</label>

<input type="text"
       id="nombre"
       class="form-control"
       placeholder="Nombre completo"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Correo

</label>

<input type="email"
       id="correo"
       class="form-control"
       placeholder="correo@ejemplo.com"
       required>

</div>

<div class="mb-3">

<label class="form-label">

Contraseña</label>

<input type="password"
       id="password"
       class="form-control"
       placeholder="********"
       required>

</div>

<button type="submit"
        class="btn btn-success w-100">

Crear Cuenta

</button>

</form>

</div>

</div>

</div>

</div>


<!-- MENU DESPUES DEL LOGIN -->

<div id="menuUsuario"
     style="display:none;">

<div class="card shadow p-4"
     style="width:400px;">

<h3 id="bienvenida">

Bienvenido

</h3>

<hr>

<h5>Historial</h5>

<div class="border rounded p-3 mb-3">

<ul id="historial" class="mb-0">

<li>No hay registros todavía</li>

</ul>

</div>

<button id="cerrarSesion"
        class="btn btn-danger w-100">

Cerrar sesión

</button>

</div>

</div>

</div>


<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>


<script>

// ELEMENTOS

const formRegistro = document.getElementById("formRegistro");

const formLogin = document.getElementById("formLogin");

const contenedorSesion = document.getElementById("contenedorSesion");

const menuUsuario = document.getElementById("menuUsuario");

const bienvenida = document.getElementById("bienvenida");


// REGISTRO

formRegistro.addEventListener("submit",function(e){

e.preventDefault();

const usuario = {

nombre: document.getElementById("nombre").value,

correo: document.getElementById("correo").value,

password: document.getElementById("password").value

};

localStorage.setItem("usuario",JSON.stringify(usuario));

alert("Usuario creado correctamente");

formRegistro.reset();

});


// LOGIN

formLogin.addEventListener("submit",function(e){

e.preventDefault();

const correo = document.getElementById("loginCorreo").value;

const password = document.getElementById("loginPassword").value;

const usuario = JSON.parse(localStorage.getItem("usuario"));

if(!usuario){

alert("Primero debe registrarse");

return;

}

if(correo === usuario.correo &&
   password === usuario.password){

localStorage.setItem("sesionActiva","true");

mostrarMenu();

}else{

alert("Correo o contraseña incorrectos");

}

});


// MOSTRAR MENU

function mostrarMenu(){

const usuario = JSON.parse(localStorage.getItem("usuario"));

contenedorSesion.style.display = "none";

menuUsuario.style.display = "block";

bienvenida.innerHTML = "Bienvenido " + usuario.nombre;

}


// MANTENER SESION

if(localStorage.getItem("sesionActiva") === "true"){

mostrarMenu();

}


// CERRAR SESION

document.getElementById("cerrarSesion")

.addEventListener("click",function(){

localStorage.removeItem("sesionActiva");

contenedorSesion.style.display = "block";

menuUsuario.style.display = "none";

});

</script>

</body>

</html>
